name: Build & Publish Add-on

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Quality checks ──────────────────────────────────────────────────
  quality:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  # ── Job 2: Tests ──────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

  # ── Job 3: Type-check ──────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type-check
        run: npm run type-check

  # ── Job 4: E2E tests ──────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start Storybook
        run: npm run storybook &

      - name: Wait for Storybook to be ready
        run: npx wait-on http://localhost:6006 --timeout 60000

      - name: Run e2e tests
        run: npm run test:e2e

  # ── Job 5: Build & Publish ────────────────────────────────────────────────
  build:
    name: Build & Publish
    permissions:
      contents: write
      packages: write

    runs-on: ubuntu-latest
    needs: [quality, test, typecheck, e2e-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create HACS-compatible ZIP
        run: |
          cd dist
          zip -r ../ha-react-dashboard.zip .
          cd ..
          ls -lh ha-react-dashboard.zip

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Docker image (aarch64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-aarch64
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ha-react-dashboard.zip
          body: |
            ## Installation Methods

            ### 🎨 **Option 1: HACS Frontend (Recommended for Dashboard)**
            ```
            1. HACS → Frontend → Explore & Download
            2. Search: "HA React Dashboard"
            3. Install and reload Home Assistant
            4. Create new dashboard from UI
            ```

            **Or manually add Custom Repository:**
            ```
            HACS → Custom repositories
            URL: https://github.com/${{ github.repository }}
            Category: Frontend
            ```

            ### 🐳 **Option 2: Add-on (For auto-serve)**
            ```
            Settings → Add-ons → Create Add-on → Add custom repository
            Repository URL: https://github.com/${{ github.repository }}
            ```

            Then install "HA React Dashboard" from the add-ons store.

            ---

            ## ✨ Features
            - ✅ No token required (uses local HA connection)
            - ✅ Auto session management
            - ✅ Drag-and-drop widget layout
            - ✅ Responsive CSS Grid design
            - ✅ Real-time entity updates
            - ✅ Storybook documentation

            ## 📋 Requirements
            - Home Assistant 2026.1.0 or later
            - Admin access for dashboard creation

            ## 🏗️ Architecture Support
            - AMD64 (x86_64 / Intel / AMD)
            - ARM64 (64-bit Raspberry Pi 4/5, ODROID, etc.)

            *Note: ARMv7 (32-bit Raspberry Pi) is not supported due to Vite 8 / Rolldown build limitations.
            Please use ARM64 images on Raspberry Pi 4+ or build locally on ARMv7 devices.*

            ## 📦 Release Contents
            - `ha-react-dashboard.zip` — Compiled frontend files for HACS
            - Docker images at `ghcr.io/${{ github.repository }}:${{ github.ref_name }}-{arch}`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
