name: Build & Publish Add-on

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run lint
        run: npm ci && npm run lint

      - name: Run tests
        run: npm run test:run

      - name: Run type-check
        run: npm run type-check

      - name: Build React App
        run: npm run build

      - name: Create HACS-compatible ZIP
        run: |
          cd dist
          zip -r ../ha-react-dashboard.zip .
          cd ..
          ls -lh ha-react-dashboard.zip

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Docker image (armv7)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm/v7
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-armv7
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Docker image (aarch64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-aarch64
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ha-react-dashboard.zip
          body: |
            ## Installation Methods

            ### 🎨 **Option 1: HACS Frontend (Recommended for Dashboard)**
            ```
            1. HACS → Frontend → Explore & Download
            2. Search: "HA React Dashboard"
            3. Install and reload Home Assistant
            4. Create new dashboard from UI
            ```

            **Or manually add Custom Repository:**
            ```
            HACS → Custom repositories
            URL: https://github.com/${{ github.repository }}
            Category: Frontend
            ```

            ### 🐳 **Option 2: Add-on (For auto-serve)**
            ```
            Settings → Add-ons → Create Add-on → Add custom repository
            Repository URL: https://github.com/${{ github.repository }}
            ```

            Then install "HA React Dashboard" from the add-ons store.

            ---

            ## ✨ Features
            - ✅ No token required (uses local HA connection)
            - ✅ Auto session management
            - ✅ Drag-and-drop widget layout
            - ✅ Responsive CSS Grid design
            - ✅ Real-time entity updates
            - ✅ Storybook documentation

            ## 📋 Requirements
            - Home Assistant 2026.1.0 or later
            - Admin access for dashboard creation

            ## 🏗️ Architecture Support (Add-on mode)
            - AMD64 (x86_64)
            - ARMv7 (32-bit Raspberry Pi)
            - ARM64 (64-bit Raspberry Pi, ODROID, etc.)

            ## 📦 Release Contents
            - `ha-react-dashboard.zip` — Compiled frontend files for HACS
            - Docker images at `ghcr.io/${{ github.repository }}:${{ github.ref_name }}-{arch}`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
