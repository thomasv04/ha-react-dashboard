name: Build and Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type-check
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:run

      - name: Build Web Component bundle (HACS panel mode)
        run: npm run build:panel
        env:
          VITE_HACS_PANEL: 'true'
        # Outputs: custom_components/ha_react_dashboard/www/ha-react-dashboard.iife.js

      - name: Patch version in manifest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 - "$VERSION" <<'PYEOF'
          import json, sys
          path = 'custom_components/ha_react_dashboard/manifest.json'
          with open(path) as f:
              m = json.load(f)
          m['version'] = sys.argv[1]
          with open(path, 'w') as f:
              json.dump(m, f, indent=2)
              f.write('\n')
          print(f"manifest.json version set to {sys.argv[1]}")
          PYEOF

      - name: Create ZIP from custom_components folder
        run: |
          cd custom_components
          zip -r ../ha-react-dashboard.zip ha_react_dashboard/
          cd ..
          echo "ZIP contents:"
          unzip -l ha-react-dashboard.zip
          ls -lh ha-react-dashboard.zip

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ha-react-dashboard.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
