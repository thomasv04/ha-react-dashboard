name: Build and Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type-check
        run: npm run type-check

      - name: Run tests
        run: npm run test:run

      - name: Run E2E tests
        run: npm ci && npx playwright install --with-deps && npm run storybook &amp; npx wait-on http://localhost:6006 --timeout 60000 && npm run test:e2e

      - name: Build React app
        run: npm run build
        env:
          VITE_HACS: 'true'
          VITE_FOLDER_NAME: community/ha-react-dashboard
          VITE_HA_URL: http://localhost:8123
          VITE_HA_TOKEN: placeholder-token-for-release

      - name: Create ZIP from dist folder
        run: |
          cd dist
          zip -r ../release-${{ github.ref_name }}.zip ./*
          cd ..
          ls -lh release-*.zip

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
