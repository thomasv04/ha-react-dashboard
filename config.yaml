name: "HA React Dashboard"
version: "1.0.0"
slug: "ha-react-dashboard"
description: "Responsive React-based dashboard for Home Assistant with drag-and-drop widgets"
url: "https://github.com/thomasv04/ha-react-dashboard"

# Supported architectures (multi-arch Docker image)
arch:
  - amd64
  - aarch64
  - armv7

startup: application
boot: auto

# HA Supervisor API access — enables $SUPERVISOR_TOKEN env var in the container
# and allows the add-on to call the HA API via http://supervisor/core
homeassistant_api: true

# Ingress: serve the UI through HA's own reverse proxy (no separate port needed)
ingress: true
ingress_port: 8099
panel_icon: "mdi:view-dashboard"
panel_title: "React Dashboard"

# Also expose port directly (useful during development / without ingress)
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Web UI"

# User-configurable options (written to /data/options.json by the supervisor)
options:
  # URL of your Home Assistant instance
  # Inside the supervisor network you can use http://supervisor/core
  ha_url: "http://supervisor/core"
  # Long-lived access token (leave empty to use the auto-generated supervisor token)
  ha_token: ""

schema:
  ha_url: str
  ha_token: str?
