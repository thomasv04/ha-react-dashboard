server {
    listen 8099;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"  always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── env-config.js: never cache (rewritten at every container start) ──────
    location = /env-config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        add_header Expires       "0"                                   always;
    }

    # ── Hashed assets (Vite fingerprints filenames): cache forever ───────────
    location ~* \.(js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback: all routes served by index.html ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Disable nginx version in error pages ─────────────────────────────────
    server_tokens off;
}
